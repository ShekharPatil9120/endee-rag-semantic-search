name: Smart Farm CI - Security & Quality Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Python Security & Quality Checks
  # ─────────────────────────────────────────
  python-checks:
    name: Python Security & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install bandit flake8 safety

      # SECURITY: Scan Python code for vulnerabilities
      - name: Bandit - Python Security Scan
        run: |
          bandit -r . -x ./venv,./env,./.git --severity-level medium
        continue-on-error: false

      # SECURITY: Check if any installed packages have known vulnerabilities
      - name: Safety - Check for Vulnerable Packages
        run: |
          safety check
        continue-on-error: true  # warning only, won't block

      # QUALITY: Check Python code style and errors
      - name: Flake8 - Python Code Quality
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,env,.git,__pycache__
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
            --statistics --exclude=venv,env,.git,__pycache__
        continue-on-error: false

  # ─────────────────────────────────────────
  # JOB 2: Secret / API Key Leak Detection
  # ─────────────────────────────────────────
  secret-scan:
    name: Detect Leaked Secrets & API Keys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for secret scanning

      - name: TruffleHog - Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────
  # JOB 3: HTML / CSS / JS Quality Checks
  # ─────────────────────────────────────────
  frontend-checks:
    name: HTML & JS Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend tools
        run: |
          npm install -g htmlhint jshint

      # QUALITY: Check HTML files for errors
      - name: HTMLHint - Check HTML Quality
        run: |
          find . -name "*.html" \
            -not -path "*/venv/*" \
            -not -path "*/node_modules/*" \
            | xargs htmlhint || true

      # QUALITY: Check JavaScript files for errors
      - name: JSHint - Check JavaScript Quality
        run: |
          find . -name "*.js" \
            -not -path "*/venv/*" \
            -not -path "*/node_modules/*" \
            | xargs jshint --esversion=6 || true

  # ─────────────────────────────────────────
  # JOB 4: Dependency Vulnerability Report
  # ─────────────────────────────────────────
  dependency-check:
    name: Dependency Vulnerability Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit - Full Dependency Audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format=markdown
          else
            echo "No requirements.txt found — skipping audit."
          fi
        continue-on-error: true  # Shows report but won't fail the build
